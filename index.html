<body>
  <h1>圍棋對弈 ⚪</h1>

<!-- Mobile menu button -->
<button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">☰</button>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  <div id="sidebarContent"></div>
</div>

<div class="game-container">
  <!-- Left Panel: Settings -->
  <div class="panel" id="settingsPanel">
    <h3>⚙️ 遊戲設定</h3>
    <div class="control-group">
      <label>棋盤大小</label>
      <select id="boardSize">
        <option value="9" selected>9 × 9</option>
        <option value="13">13 × 13</option>
        <option value="19">19 × 19</option>

    </div>
    <div class="control-group">
      <label>比賽規則</label>
      <select id="gameRules">
        <option value="chinese" selected>中國規則（數子法）</option>

    </div>
    <div class="control-group">
      <label>對弈模式</label>
      <select id="gameMode">
        <option value="pvp">人 vs 人</option>
        <option value="pvc" selected>人 vs 電腦</option>
      </select>
    </div>
    <div class="control-group" id="playerColorGroup">
      <label>玩家執子</label>
      <select id="playerColor">
        <option value="1">執黑（先手）</option>
        <option value="2">執白（後手）</option>
      </select>
    </div>
    <div class="control-group" id="aiStrengthGroup">
      <label>AI 強度（GnuGo 等級）</label>
      <select id="aiStrength">
        <option value="1" selected>初級（Level 1）</option>
        <option value="5">中級（Level 5）</option>
        <option value="10">高級（Level 10）</option>
      </select>
    </div>

    <h3 style="margin-top:16px">🔧 功能開關</h3>
    <div class="toggle-row">
      <span>計時器</span>
      <label class="toggle"><input type="checkbox" id="timerToggle"><span class="slider"></span></label>
    </div>
    <div id="timerSettings" style="display:none; margin-bottom:8px;">
      <label style="font-size:12px;color:#8899bb">每方時間（分鐘）</label>
      <select id="timerMinutes" style="margin-top:2px">
        <option value="5">5 分鐘</option>
        <option value="10" selected>10 分鐘</option>

    <div class="control-group" style="margin-top:4px">

    <button class="primary" onclick="closeSidebar(); startNewGame()" style="margin-top:12px">🎮 開始新遊戲</button>
  </div>

  <!-- Center: Board -->
  <div class="board-wrapper">
    <!-- Mobile compact info bar -->
    <div class="mobile-info-bar" id="mobileInfoBar">
      <div class="turn-badge black" id="mobileTurn">⚫ 黑方</div>
      <div class="info-item">⚫ <span id="mobileBlackCap">0</span></div>
      <div class="info-item">⚪ <span id="mobileWhiteCap">0</span></div>
      <div class="info-item">第 <span id="mobileMoveCount">0</span> 手</div>

    <canvas id="board"></canvas>
    <div class="guidance-tooltip" id="guidanceTooltip" style="display:none"></div>
    <div id="guidanceLegend" style="display:none; width:100%; max-width:500px; margin-top:8px; padding:10px 12px; background:#16213e; border:1px solid #2a3a5e; border-radius:8px; color:#e0e0e0; font-size:13px; line-height:1.5;"></div>
    <div id="reviewBar" style="display:none; width:100%; max-width:500px; margin-top:6px;">
      <div class="review-controls">
        <button onclick="reviewGo(0)" title="回到開始">⏮</button>
        <button onclick="reviewGo(currentReviewMove-1)" title="上一手">◀</button>
        <button onclick="reviewGo(currentReviewMove+1)" title="下一手">▶</button>
        <button onclick="reviewGo(moveHistory.length)" title="到最新">⏭</button>

    <!-- Mobile action buttons -->
    <div class="mobile-action-bar" id="mobileActionBar">
      <button onclick="doPass()">🤚 Pass</button>
      <button onclick="doUndo()">↩️ 悔棋</button>
      <button onclick="showHintOnce()">💡 提示</button>
      <button onclick="doResign()" class="danger">🏳️ 認輸</button>
    </div>
    <div class="mobile-status" id="mobileStatus"></div>
  </div>

  <!-- Right Panel: Game Info -->
  <div class="panel" id="infoPanel">
    <h3>📊 對局資訊</h3>
    <div class="current-turn black" id="turnDisplay">⚫ 黑方回合</div>

    <div id="timerArea" style="display:none;">
      <div class="info-row"><span class="label">⚫ 黑方時間</span></div>
      <div class="timer-display" id="blackTimer">10:00</div>
      <div class="info-row"><span class="label">⚪ 白方時間</span></div>
      <div class="timer-display" id="whiteTimer">10:00</div>
    </div>

    <div class="info-row">
      <span class="label">⚫ 黑方提子</span>
      <span class="value black-indicator" id="blackCaptures">0</span>
    </div>
    <div class="info-row">
      <span class="label">⚪ 白方提子</span>
      <span class="value white-indicator" id="whiteCaptures">0</span>
    </div>
    <div class="info-row">
      <span class="label">手數</span>
      <span class="value" id="moveCount">0</span>
    </div>

    <div class="status-msg" id="statusMsg">請開始新遊戲</div>

    <div style="margin-top:12px">
      <button onclick="doPass()">🤚 Pass（虛手）</button>
      <button onclick="doUndo()" id="undoBtn">↩️ 悔棋</button>
      <button onclick="doResign()" class="danger">🏳️ 認輸</button>
      <button onclick="enterReview()" id="reviewBtn" style="display:none">📖 覆盤</button>
      <button onclick="exitReview()" id="exitReviewBtn" style="display:none">❌ 結束覆盤</button>
      <button onclick="startAnalysis()" id="analysisBtn" style="display:none">🤖 AI 分析</button>
    </div>
    <!-- Analysis panel -->
    <div id="analysisPanel" style="display:none; margin-top:10px;">
      <div style="background:#1e2d50;border-radius:8px;padding:12px;">
        <h4 style="color:#f0d060;margin-bottom:8px;text-align:center">🤖 AI 覆盤分析</h4>
        <div id="analysisProgressBar" style="display:none;margin-bottom:8px;">
          <div style="background:#2a3a5e;border-radius:4px;height:8px;overflow:hidden;">
            <div id="analysisProgressFill" style="background:#c0943a;height:100%;width:0%;transition:width 0.3s;"></div>
          </div>
          <div id="analysisProgressText" style="font-size:12px;color:#8899bb;text-align:center;margin-top:4px;">分析中...</div>
        </div>
        <div id="analysisSummary" style="display:none;">
          <div class="score-row"><span>✅ 好手</span><span id="goodCount" style="color:#4caf50">0</span></div>
          <div class="score-row"><span>⚠️ 疑問手</span><span id="questionCount" style="color:#ff9800">0</span></div>
          <div class="score-row"><span>❌ 惡手</span><span id="badCount" style="color:#f44336">0</span></div>
        </div>
        <div id="analysisMoveInfo" style="display:none;margin-top:8px;font-size:13px;color:#8899bb;text-align:center;"></div>
      </div>
    </div>

    <!-- Scoring Panel -->
    <div class="scoring-panel" id="scoringPanel" style="display:none">
      <h4>📐 數目結果</h4>
      <div class="score-row"><span>⚫ 黑方</span><span id="blackScore">0</span></div>
      <div class="score-row" style="font-size:12px;color:#8899bb"><span id="blackScoreLabel">　棋子+目</span><span id="blackDetail"></span></div>
      <div class="score-row"><span>⚪ 白方</span><span id="whiteScore">0</span></div>
      <div class="score-row" style="font-size:12px;color:#8899bb"><span id="whiteScoreLabel">　棋子+目（含貼目）</span><span id="whiteDetail"></span></div>
      <div class="score-row" style="border-top:1px solid #3a4a6e;padding-top:8px;margin-top:4px">
        <span style="font-weight:bold">結果</span>
        <span style="font-weight:bold;color:#f0d060" id="resultText"></span>
      </div>
      <p style="font-size:11px;color:#667;margin-top:8px">點擊棋盤上的死子將其標記</p>
      <button onclick="confirmScoring()" class="primary" style="margin-top:6px">✅ 確認結果</button>
      <button onclick="cancelScoring()">取消數目</button>
    </div>
  </div>
</div>

<!-- Result Modal -->
<div class="modal-overlay" id="resultModal">
  <div class="modal">
    <h2 id="modalTitle">遊戲結束</h2>
    <p id="modalResult"></p>
    <p id="modalDetail" style="font-size:13px;color:#8899bb"></p>
    <button class="primary" onclick="closeModal()">確定</button>
  </div>
</div>

<div class="version-footer" id="versionFooter">版本：dev</div>

<script src="gnugo-loader.js?v=v2026.03.15-9c49be6"></script>
<script src="gnugo-service.js?v=v2026.03.15-9c49be6"></script>
<script src="rules.js?v=v2026.03.15-9c49be6"></script>
<script src="game-state.js?v=v2026.03.15-9c49be6"></script>
<script src="ui.js?v=v2026.03.15-9c49be6"></script>
<script>
// ==================== CONSTANTS ====================
const EMPTY = 0, BLACK = 1, WHITE = 2;
let komi = 7.5;
let gameRules = 'chinese'; // 'chinese' or 'japanese'

const STAR_POINTS = {
  9:  [[2,2],[2,6],[4,4],[6,2],[6,6]],
  13: [[3,3],[3,6],[3,9],[6,3],[6,6],[6,9],[9,3],[9,6],[9,9]],
  19: [[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]]
};

// ==================== GAME STATE ====================
let size = 19;
let board = [];
let currentPlayer = BLACK;
let captures = { [BLACK]: 0, [WHITE]: 0 };
let moveHistory = [];
let boardHistory = [];
let koPoint = null;
let passCount = 0;
let gameOver = false;
let gameMode = 'pvc';
let playerColor = BLACK;
let aiLevel = 10;
let isAIThinking = false;

// Timer
let timerEnabled = false;
let timerSeconds = { [BLACK]: 600, [WHITE]: 600 };
let timerInterval = null;

// Review
let isReviewing = false;
let currentReviewMove = 0;

// AI Analysis
let analysisData = null;  // array of { move, aiSuggestion, rating }
let isAnalyzing = false;
let analysisProgress = 0;

// Scoring
let isScoring = false;
let deadStones = new Set();

// Hint
let showingHint = false;

// Beginner Guidance
let guidanceEnabled = false;
let guidanceHints = [];       // [{x, y, rank, label}]
let guidanceTooltip = null;   // {x, y, label} currently showing tooltip
let guidanceLoading = false;

// Canvas
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
let cellSize = 30;
let padding = 40;
let lastMove = null;
let hoverPos = null;

// ==================== BOARD / RULES ENGINE ====================
const createBoard = GoRules.createBoard;
const cloneBoard = GoRules.cloneBoard;
const opponent = GoRules.opponent;

function inBounds(x, y) {
  return GoRules.inBounds(size, x, y);
}

function getNeighbors(x, y) {
  return GoRules.getNeighbors(size, x, y);
}

function getGroup(b, x, y) {
  return GoRules.getGroup(b, size, x, y);
}

function removeGroup(b, stones) {
  return GoRules.removeGroup(b, stones);
}

function boardToString(b) {
  return GoRules.boardToString(b);
}

function tryPlaceStone(b, x, y, player, currentKo) {
  return GoRules.tryPlaceStone(b, size, x, y, player, currentKo);
}

function getLegalMoves(b, player, ko) {
  return GoRules.getLegalMoves(b, size, player, ko);
}

// ==================== SCORING ====================
function calculateScore(b, dead) {
  return GoRules.calculateScore(b, size, dead, captures, gameRules, komi);
}

// ==================== CAPTURE HINTS ====================
function showHintOnce() {
  if (gameOver || isReviewing || isScoring || isAIThinking) return;
  showingHint = true;
  drawBoard();
}

function clearHint() {
  if (showingHint) {
    showingHint = false;
    drawBoard();
  }
}

function getCaptureHints(b, player) {
  const hints = [];
  const seen = new Set();
  const opp = opponent(player);

  for (let x = 0; x < size; x++) {
    for (let y = 0; y < size; y++) {
      if (b[x][y] !== opp) continue;
      const group = getGroup(b, x, y);
      if (group.liberties.size === 1) {
        // This group has exactly 1 liberty — can be captured!
        for (const libKey of group.liberties) {
          const lx = Math.floor(libKey / size);
          const ly = libKey % size;
          const key = `${lx},${ly}`;
          if (!seen.has(key)) {
            // Verify it's a valid move
            const result = tryPlaceStone(b, lx, ly, player, koPoint);
            if (result.valid) {
              hints.push([lx, ly]);
              seen.add(key);
            }
          }
        }
      }
    }
  }
  return hints;
}

// ==================== BEGINNER GUIDANCE ====================
function getGamePhase() {
  const total = moveHistory.length;
  const threshold = size <= 9 ? 10 : size <= 13 ? 20 : 30;
  if (total < threshold) return 'opening';
  if (total < threshold * 3) return 'middle';
  return 'endgame';
}

function getGuidanceLabel(x, y, rank, phase) {
  const isCorner = (r, c) => {
    const margin = size <= 9 ? 2 : 3;
    return (r < margin || r >= size - margin) && (c < margin || c >= size - margin);
  };
  const isSide = (r, c) => {
    const margin = size <= 9 ? 2 : 3;
    return r < margin || r >= size - margin || c < margin || c >= size - margin;
  };

  if (phase === 'opening') {
    if (isCorner(x, y)) {
      const cornerStones = board[x] && board[x][y] === EMPTY;
      const nearby = getNeighbors(x, y).some(([nx, ny]) => board[nx][ny] !== EMPTY);
      if (nearby) return '守角';
      return '佔角';
    }
    if (isSide(x, y)) return '拓邊';
    return '佈局';
  } else if (phase === 'middle') {
    // Check if this move would capture
    const opp = opponent(currentPlayer);
    for (const [nx, ny] of getNeighbors(x, y)) {
      if (board[nx][ny] === opp) {
        const group = getGroup(board, nx, ny);
        if (group.liberties.size <= 2) return '攻擊';
      }
    }
    // Check if this protects own weak group
    for (const [nx, ny] of getNeighbors(x, y)) {
      if (board[nx][ny] === currentPlayer) {
        const group = getGroup(board, nx, ny);
        if (group.liberties.size <= 2) return '補強';
      }
    }
    if (isSide(x, y)) return '拓邊';
    return '中腹';
  } else {
    // Endgame
    if (isSide(x, y)) return '收官';
    return '收官';
  }
}

function requestGuidanceHints() {
  if (!guidanceEnabled || gameOver || isReviewing || isScoring || isAIThinking) return;
  if (gameMode === 'pvc' && currentPlayer !== playerColor) return;

  guidanceHints = [];
  guidanceTooltip = null;
  hideGuidanceTooltip();

  if (!GnuGoService.isReady()) {
    guidanceLoading = true;
    drawBoard();
    initGnuGo().then(() => {
      guidanceLoading = false;
      if (guidanceEnabled) requestGuidanceHints();
    }).catch(() => {
      guidanceLoading = false;
    });
    return;
  }

  guidanceLoading = true;
  drawBoard();

  setTimeout(() => {
    try {
      const phase = getGamePhase();
      const hints = [];
      const topMoves = GnuGoService.getTopMoves(moveHistory, size, komi, currentPlayer, 3);

      topMoves.forEach((move, index) => {
        const label = getGuidanceLabel(move[0], move[1], index, phase);
        hints.push({ x: move[0], y: move[1], rank: index, label });
      });

      guidanceHints = hints;
    } catch (e) {
      console.error('Guidance hint error:', e);
      guidanceHints = [];
    }
    guidanceLoading = false;
    renderGuidanceLegend();
    drawBoard();
  }, 10);
}

function renderGuidanceLegend() {
  const legend = document.getElementById('guidanceLegend');
  if (!guidanceEnabled || guidanceHints.length === 0 || gameOver || isReviewing || isScoring) {
    legend.style.display = 'none';
    legend.innerHTML = '';
    return;
  }
  const rankNames = ['⭐ 最佳', '🔵 次佳', '🟢 可考慮'];
  legend.innerHTML = guidanceHints.map((hint) => {
    const coord = `${String.fromCharCode(65 + hint.y)}${size - hint.x}`;
    return `<div><strong>${rankNames[hint.rank] || '提示'}</strong>：${coord} — ${hint.label}</div>`;
  }).join('');
  legend.style.display = 'block';
}

function clearGuidance() {
  guidanceHints = [];
  guidanceTooltip = null;
  hideGuidanceTooltip();
  renderGuidanceLegend();
}

function hideGuidanceTooltip() {
  GoUI.hideGuidanceTooltip();
}

function showGuidanceTooltipAt(hint) {
  GoUI.showGuidanceTooltipAt({ canvas, padding, cellSize }, hint);
}

// ==================== RENDERING ====================
function getCurrentStateSnapshot() {
  return {
    size,
    board,
    currentPlayer,
    captures,
    moveHistory,
    boardHistory,
    koPoint,
    passCount,
    gameOver,
    lastMove,
    gameMode,
    playerColor,
    aiLevel,
    timerEnabled,
    timerSeconds,
    gameRules,
    komi,
    isReviewing,
    currentReviewMove,
    isScoring,
    deadStones,
    isAIThinking
  };
}

function buildBoardViewState() {
  const state = getCurrentStateSnapshot();
  const displayBoard = isReviewing ? getReviewBoard() : board;
  const scoreData = isScoring ? calculateScore(board, deadStones) : null;
  const captureHints = showingHint && !gameOver && !isReviewing && !isScoring && !isAIThinking
    ? getAllCaptureMoves(board, size, currentPlayer, koPoint)
    : [];
  const lastMoveToShow = isReviewing ? getReviewLastMove() : lastMove;

  return {
    ...state,
    displayBoard,
    deadStones,
    lastMove: lastMoveToShow,
    scoreData,
    analysisData,
    isAnalyzing,
    showingHint,
    captureHints,
    guidanceEnabled,
    guidanceLoading,
    guidanceHints
  };
}

function drawBoard() {
  const deps = {
    canvas,
    ctx,
    padding,
    cellSize,
    starPoints: STAR_POINTS
  };
  GoUI.drawBoard(deps, buildBoardViewState());
  cellSize = deps.cellSize;
  padding = deps.padding;
}

// ==================== GAME ACTIONS ====================
function placeStone(x, y) {
  if (gameOver || isReviewing || isScoring) return false;
  if (isAIThinking && gameMode === 'pvc') return false;

  syncGameStateStore();
  const result = GameState.applyMove(x, y);
  if (!result.ok) return false;
  applyStateFromStore();

  showingHint = false;
  clearGuidance();

  updateUI();
  const willRequestAI = gameMode === 'pvc' && currentPlayer !== playerColor && !gameOver;
  const previousIsAIThinking = isAIThinking;
  isAIThinking = willRequestAI ? true : previousIsAIThinking;
  syncStatus();
  isAIThinking = previousIsAIThinking;
  drawBoard();
  playSound('place');
  if (result.captured > 0) setTimeout(() => playSound('capture'), 80);

  if (timerEnabled) switchTimer();

  if (willRequestAI) {
    setTimeout(() => requestAIMove(), 100);
  }

  if (guidanceEnabled && !gameOver) {
    if (gameMode !== 'pvc' || currentPlayer === playerColor) {
      setTimeout(() => requestGuidanceHints(), 150);
    }
  }

  return true;
}

function doPass() {
  if (gameOver || isReviewing || isScoring || isAIThinking) return;

  showingHint = false;
  clearGuidance();

  syncGameStateStore();
  const result = GameState.applyPass();
  if (!result.ok) return;
  applyStateFromStore();

  if (result.endedByDoublePass) {
    endGameByScoring();
    return;
  }

  updateUI();
  const willRequestAI = gameMode === 'pvc' && currentPlayer !== playerColor && !gameOver;
  const previousIsAIThinking = isAIThinking;
  isAIThinking = willRequestAI ? true : previousIsAIThinking;
  syncStatus();
  isAIThinking = previousIsAIThinking;
  drawBoard();

  if (timerEnabled) switchTimer();

  if (willRequestAI) {
    setTimeout(() => requestAIMove(), 100);
  }

  if (guidanceEnabled && !gameOver) {
    if (gameMode !== 'pvc' || currentPlayer === playerColor) {
      setTimeout(() => requestGuidanceHints(), 150);
    }
  }
}

function doUndo() {
  if (gameOver || isReviewing || isScoring) return;
  showingHint = false;
  clearGuidance();
  if (!document.getElementById('undoToggle').checked) {
    setStatus('悔棋功能已關閉');
    return;
  }
  if (boardHistory.length === 0) return;

  syncGameStateStore();
  const result = GameState.undo({ gameMode });
  if (!result.ok) return;
  applyStateFromStore();

  updateUI();
  drawBoard();
  setStatus('已悔棋');
  syncGameStateStore();

  if (guidanceEnabled && !gameOver) {
    setTimeout(() => requestGuidanceHints(), 150);
  }
}

function doResign() {
  if (gameOver || isReviewing || isScoring) return;
  const winner = opponent(currentPlayer);
  endGame(`${winner === BLACK ? '⚫ 黑方' : '⚪ 白方'}勝`, `${currentPlayer === BLACK ? '黑' : '白'}方認輸`);
}

function endGameByScoring() {
  syncGameStateStore();
  GameState.beginScoring();
  applyStateFromStore();
  stopTimer();

// ==================== AI REVIEW ANALYSIS ====================
function buildSGFUpTo(n) {
  const letters = 'abcdefghijklmnopqrs';
  let sgf = `(;GM[1]FF[4]SZ[${size}]KM[${komi}]`;
  for (let i = 0; i < n; i++) {
    const m = moveHistory[i];
    const color = m.player === BLACK ? 'B' : 'W';
    if (m.pass) {
      sgf += `;${color}[]`;
    } else {
      sgf += `;${color}[${letters[m.y]}${letters[m.x]}]`;
    }
  }
  sgf += ')';
  return sgf;
}

function startAnalysis() {
  if (isAnalyzing || !gameOver || moveHistory.length === 0) return;

  initGnuGo().then(() => {
    isAnalyzing = true;
    analysisData = [];
    analysisProgress = 0;

    document.getElementById('analysisBtn').style.display = 'none';
    document.getElementById('analysisPanel').style.display = 'block';
    document.getElementById('analysisProgressBar').style.display = 'block';
    document.getElementById('analysisSummary').style.display = 'none';
    document.getElementById('analysisMoveInfo').style.display = 'none';

    analyzeStep(0);
  }).catch(() => {
    setStatus('⚠️ AI 引擎未就緒，無法分析');
  });
}

function analyzeStep(moveIndex) {
  if (moveIndex >= moveHistory.length) {
    finishAnalysis();
    return;
  }

  const m = moveHistory[moveIndex];

  // Skip pass moves
  if (m.pass) {
    analysisData.push({ move: m, aiSuggestion: null, rating: 'neutral' });
    analysisProgress = Math.round(((moveIndex + 1) / moveHistory.length) * 100);
    updateAnalysisProgress();
    setTimeout(() => analyzeStep(moveIndex + 1), 10);
    return;
  }

  // Build SGF up to this move (not including it), ask GnuGo what it would play
  const sgf = buildSGFUpTo(moveIndex);

  setTimeout(() => {
    try {
      const level = 10; // always use max level for analysis
      const aiMove = GnuGoService.play(level, sgf, moveIndex, size).move;

      let rating = 'good';
      if (aiMove) {
        const dist = Math.abs(aiMove[0] - m.x) + Math.abs(aiMove[1] - m.y);
        if (dist === 0) {
          rating = 'good';       // Same as AI
        } else if (dist <= 3) {
          rating = 'good';       // Close enough
        } else if (dist <= 7) {
          rating = 'question';   // Questionable
        } else {
          rating = 'bad';        // Very different
        }
      }

      analysisData.push({
        move: m,
        aiSuggestion: aiMove,
        rating: rating
      });
    } catch (e) {
      analysisData.push({ move: m, aiSuggestion: null, rating: 'neutral' });
    }

    analysisProgress = Math.round(((moveIndex + 1) / moveHistory.length) * 100);
    updateAnalysisProgress();
    setTimeout(() => analyzeStep(moveIndex + 1), 10);
  }, 10);
}

function updateAnalysisProgress() {
  document.getElementById('analysisProgressFill').style.width = analysisProgress + '%';
  document.getElementById('analysisProgressText').textContent =
    `分析中... ${analysisProgress}%（${analysisData.length} / ${moveHistory.length} 手）`;
}

function finishAnalysis() {
  isAnalyzing = false;
  document.getElementById('analysisProgressBar').style.display = 'none';
  document.getElementById('analysisSummary').style.display = 'block';
  document.getElementById('analysisMoveInfo').style.display = 'block';

  let good = 0, question = 0, bad = 0;
  for (const d of analysisData) {
    if (d.rating === 'good') good++;
    else if (d.rating === 'question') question++;
    else if (d.rating === 'bad') bad++;
  }
  document.getElementById('goodCount').textContent = good;
  document.getElementById('questionCount').textContent = question;
  document.getElementById('badCount').textContent = bad;

  updateAnalysisMoveInfo();
  drawBoard();
}

function updateAnalysisMoveInfo() {
  const el = document.getElementById('analysisMoveInfo');
  if (!analysisData || currentReviewMove === 0) {
    el.textContent = '';
    return;
  }
  const d = analysisData[currentReviewMove - 1];
  if (!d || d.move.pass) {
    el.textContent = 'Pass';
    return;
  }
  const letters = 'ABCDEFGHJKLMNOPQRST';
  const ratingText = d.rating === 'good' ? '✅ 好手' : d.rating === 'question' ? '⚠️ 疑問手' : d.rating === 'bad' ? '❌ 惡手' : '';
  let text = `${ratingText}`;
  if (d.aiSuggestion && d.rating !== 'good') {
    text += `　AI 建議：${letters[d.aiSuggestion[1]]}${size - d.aiSuggestion[0]}`;
  }
  el.textContent = text;
}

function mcts(board, player, ko, simulations, timeLimitMs) {

  let best = root.children[0];

// ==================== SOUND ====================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ac = getAudioCtx();
    const t = ac.currentTime;

    if (type === 'place') {
      // Realistic stone-on-wood click: short noise burst with bandpass
      const bufLen = ac.sampleRate * 0.06;
      const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufLen * 0.08));
      }
      const src = ac.createBufferSource();
      src.buffer = buf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800;
      bp.Q.value = 1.5;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0.35, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      src.connect(bp);
      bp.connect(gain);
      gain.connect(ac.destination);
      src.start(t);
      src.stop(t + 0.08);

    } else if (type === 'capture') {
      // Capture: two quick taps + low thud
      for (let i = 0; i < 2; i++) {
        const bufLen = ac.sampleRate * 0.04;
        const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
        const data = buf.getChannelData(0);
        for (let j = 0; j < bufLen; j++) {
          data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (bufLen * 0.06));
        }
        const src = ac.createBufferSource();
        src.buffer = buf;
        const bp = ac.createBiquadFilter();
        bp.type = 'bandpass';
        bp.frequency.value = 1200 - i * 300;
        bp.Q.value = 1.0;
        const gain = ac.createGain();
        gain.gain.setValueAtTime(0.2, t + i * 0.07);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.04);
        src.connect(bp);
        bp.connect(gain);
        gain.connect(ac.destination);
        src.start(t + i * 0.07);
        src.stop(t + i * 0.07 + 0.06);
      }

    } else if (type === 'pass') {
      // Pass: soft double knock
      const osc = ac.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 440;
      const gain = ac.createGain();
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.02);
      gain.gain.linearRampToValueAtTime(0, t + 0.08);
      gain.gain.linearRampToValueAtTime(0.06, t + 0.15);
      gain.gain.linearRampToValueAtTime(0, t + 0.22);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.25);

    } else if (type === 'gameend') {
      // Game end: pleasant two-tone chime
      [523, 659].forEach((freq, i) => {
        const osc = ac.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const gain = ac.createGain();
        gain.gain.setValueAtTime(0.15, t + i * 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.2 + 0.5);
        osc.connect(gain);
        gain.connect(ac.destination);
        osc.start(t + i * 0.2);
        osc.stop(t + i * 0.2 + 0.6);
      });
    }
  } catch (e) {}
}

  GoUI.setStatus(msg);
}

function syncStatus(message = '') {
  const state = { currentPlayer, gameOver, isScoring, isReviewing, isAIThinking };
  if (typeof GoUI.syncStatus === 'function') {
    GoUI.syncStatus(state, message);
    return;
  }
  if (typeof GoUI.getStatusMessage === 'function') {
    GoUI.setStatus(GoUI.getStatusMessage(state, message));
    return;
  }
  if (message) {
    GoUI.setStatus(message);
    return;
  }
  if (gameOver) {
    GoUI.setStatus('遊戲已結束');
    return;
  }
  if (isScoring) {
    GoUI.setStatus('請標記死子，然後確認結果');
    return;
  }
  if (isReviewing) {
    GoUI.setStatus('覆盤模式');
    return;
  }
  if (isAIThinking) {
    GoUI.setStatus('🤔 GnuGo 思考中...');
    return;
  }
  GoUI.setStatus(`${currentPlayer === BLACK ? '黑' : '白'}方回合`);
}

function startNewGame() {
  // Read settings
  size = parseInt(document.getElementById('boardSize').value);
  gameMode = document.getElementById('gameMode').value;
  playerColor = parseInt(document.getElementById('playerColor').value);
  aiLevel = parseInt(document.getElementById('aiStrength').value);
  timerEnabled = document.getElementById('timerToggle').checked;
  gameRules = document.getElementById('gameRules').value;
  komi = gameRules === 'japanese' ? 6.5 : 7.5;

  GameState.startGame({
    size,
    gameMode,
    playerColor,
    aiLevel,
    timerEnabled,
    timerSeconds,
    gameRules,
    komi
  });
  applyStateFromStore();

  isAIThinking = false;
  syncGameStateStore();
  analysisData = null;
  isAnalyzing = false;
  guidanceEnabled = document.getElementById('guidanceToggle').checked;
  guidanceHints = [];
  guidanceTooltip = null;
  guidanceLoading = false;
  hideGuidanceTooltip();

  // UI reset
  document.getElementById('scoringPanel').style.display = 'none';
  document.getElementById('reviewBar').style.display = 'none';
  document.getElementById('reviewBtn').style.display = 'none';
  document.getElementById('exitReviewBtn').style.display = 'none';
  document.getElementById('analysisBtn').style.display = 'none';
  document.getElementById('analysisPanel').style.display = 'none';
  document.getElementById('resultModal').classList.remove('show');

  // Timer
  stopTimer();
  if (timerEnabled) {
    initTimer();
    startTimer();
  }

  const aiStartsGame = gameMode === 'pvc' && playerColor === WHITE && !gameOver;
  isAIThinking = false;
  syncGameStateStore();
  updateUI();
  syncStatus(aiStartsGame ? '🤔 GnuGo 思考中...' : '');
  drawBoard();
  clearSave();
  saveGame();

  // If PvC mode, preload GnuGo and start if AI plays black
  if (gameMode === 'pvc') {
    initGnuGo().then(() => {
      if (playerColor === WHITE && !gameOver) {
        setTimeout(() => requestAIMove(), 300);
      }
    });
  }

  // Beginner guidance on game start
  if (guidanceEnabled) {
    setTimeout(() => requestGuidanceHints(), 200);
  }
}

// ==================== EVENT HANDLERS ====================
function getBoardPositionFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const point = e.touches?.[0] || e.changedTouches?.[0] || e;
  const scaleX = rect.width > 0 ? canvas.width / rect.width : 1;
  const scaleY = rect.height > 0 ? canvas.height / rect.height : 1;
  const mx = (point.clientX - rect.left) * scaleX;
  const my = (point.clientY - rect.top) * scaleY;
  const x = Math.round((my - padding) / cellSize);
  const y = Math.round((mx - padding) / cellSize);
  return inBounds(x, y) ? [x, y] : null;
}

function handleBoardInteraction(e) {
  const pos = getBoardPositionFromEvent(e);
  if (!pos) return;
  const [x, y] = pos;

  if (isScoring) {
    // Toggle dead stones
    if (board[x][y] !== EMPTY) {
      const group = getGroup(board, x, y);
      syncGameStateStore();
      const result = GameState.toggleDeadGroup(group.stones);
      if (!result.ok) return;
      applyStateFromStore();
      updateScoringDisplay();
      drawBoard();
    }
    return;
  }

  if (guidanceEnabled && guidanceHints.length > 0) {
    const hint = guidanceHints.find(h => h.x === x && h.y === y);
    guidanceTooltip = hint || null;
    if (hint) {
      showGuidanceTooltipAt(hint);
    } else {
      hideGuidanceTooltip();
    }
  }

  placeStone(x, y);
}

canvas.addEventListener('mousemove', (e) => {
  const pos = getBoardPositionFromEvent(e);
  hoverPos = pos;
  drawBoard();
});

canvas.addEventListener('mouseleave', () => {
  hoverPos = null;
  drawBoard();
});

let lastTouchInteractionAt = 0;

canvas.addEventListener('click', (e) => {
  if (Date.now() - lastTouchInteractionAt < 500) return;
  handleBoardInteraction(e);
});
canvas.addEventListener('touchstart', (e) => {
  const pos = getBoardPositionFromEvent(e);
  hoverPos = pos;
  drawBoard();
}, { passive: true });
canvas.addEventListener('touchend', (e) => {
  lastTouchInteractionAt = Date.now();
  e.preventDefault();
  handleBoardInteraction(e);
}, { passive: false });

// Settings visibility toggles
document.getElementById('gameMode').addEventListener('change', (e) => {
  const isPvC = e.target.value === 'pvc';
  document.getElementById('playerColorGroup').style.display = isPvC ? 'block' : 'none';
  document.getElementById('aiStrengthGroup').style.display = isPvC ? 'block' : 'none';
});

document.getElementById('guidanceToggle').addEventListener('change', (e) => {
  guidanceEnabled = e.target.checked;
  if (guidanceEnabled && !gameOver && !isReviewing && !isScoring) {
    requestGuidanceHints();
  } else {
    clearGuidance();
    drawBoard();
  }
  renderGuidanceLegend();
});

document.getElementById('timerToggle').addEventListener('change', (e) => {
  const show = e.target.checked;
  document.getElementById('timerSettings').style.display = show ? 'block' : 'none';
  document.getElementById('timerArea').style.display = show ? 'block' : 'none';
});

// Keyboard shortcuts for review
document.addEventListener('keydown', (e) => {
  if (!isReviewing) return;
  if (e.key === 'ArrowLeft') reviewGo(currentReviewMove - 1);
  else if (e.key === 'ArrowRight') reviewGo(currentReviewMove + 1);
  else if (e.key === 'Home') reviewGo(0);
  else if (e.key === 'End') reviewGo(moveHistory.length);
});

// Resize — also close sidebar if switching away from mobile
window.addEventListener('resize', () => {
  if (window.innerWidth > 900) closeSidebar();
  drawBoard();
});

// ==================== SAVE / RESTORE ====================
const SAVE_KEY = 'gogame_state';

function syncGameStateStore() {
  GameState.sync(getCurrentStateSnapshot());
}

function applyStateFromStore() {
  const s = GameState.getState();
  size = s.size;
  board = s.board.map(r => [...r]);
  currentPlayer = s.currentPlayer;
  captures = { ...s.captures };
  moveHistory = (s.moveHistory || []).map(m => ({ ...m }));
  boardHistory = (s.boardHistory || []).map(h => ({
    board: h.board.map(r => [...r]),
    captures: { ...h.captures },
    koPoint: h.koPoint,
    currentPlayer: h.currentPlayer,
    lastMove: h.lastMove,
    passCount: h.passCount
  }));
  koPoint = s.koPoint;
  passCount = s.passCount;
  gameOver = s.gameOver;
  lastMove = s.lastMove;
  gameMode = s.gameMode;
  playerColor = s.playerColor;
  aiLevel = s.aiLevel;
  timerEnabled = s.timerEnabled;
  timerSeconds = { ...s.timerSeconds };
  gameRules = s.gameRules;
  komi = s.komi;
  isReviewing = s.isReviewing;
  currentReviewMove = s.currentReviewMove;
  isScoring = s.isScoring;
  deadStones = new Set(s.deadStones || []);
  isAIThinking = !!s.isAIThinking;
  syncStatus();
}

function saveGame() {
  if (isReviewing || isScoring) return;
  syncGameStateStore();
  const snapshot = GameState.getSnapshot();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(snapshot)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (!s || !s.board) return false;

    GameState.restoreSnapshot(s);
    applyStateFromStore();

    // Sync UI controls
    document.getElementById('boardSize').value = size;
    document.getElementById('gameMode').value = gameMode;
    document.getElementById('playerColor').value = playerColor;
    document.getElementById('aiStrength').value = aiLevel;
    document.getElementById('timerToggle').checked = timerEnabled;
    document.getElementById('gameRules').value = gameRules;
    document.getElementById('playerColorGroup').style.display = gameMode === 'pvc' ? 'block' : 'none';
    document.getElementById('aiStrengthGroup').style.display = gameMode === 'pvc' ? 'block' : 'none';
    document.getElementById('timerSettings').style.display = timerEnabled ? 'block' : 'none';
    document.getElementById('timerArea').style.display = timerEnabled ? 'block' : 'none';
    if (timerEnabled) updateTimerDisplay();
    if (gameOver && document.getElementById('reviewToggle').checked) {
      document.getElementById('reviewBtn').style.display = 'block';
    }

    updateUI();
    drawBoard();
    syncStatus(gameOver ? '遊戲已結束' : `已恢復棋局（第 ${moveHistory.length} 手）`);

    // Preload GnuGo if needed
    if (gameMode === 'pvc' && !gameOver) {
      initGnuGo().then(() => {
        if (currentPlayer !== playerColor) {
          setTimeout(() => requestAIMove(), 300);
        }
      });
    }
    return true;
  } catch(e) {
    console.error('Failed to load game:', e);
    return false;
  }
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

// Auto-save after each move
const origPlaceStone = placeStone;
placeStone = function(x, y) {
  const result = origPlaceStone(x, y);
  if (result) saveGame();
  return result;
};

const origDoPass = doPass;
doPass = function() {
  origDoPass();
  saveGame();
};

const origDoUndo = doUndo;
doUndo = function() {
  origDoUndo();
  saveGame();
};

// ==================== MOBILE SIDEBAR ====================
const sidebarContent = document.getElementById('sidebarContent');
const gameContainer = document.querySelector('.game-container');

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (sidebar.classList.contains('open')) {
    closeSidebar();
  } else {
    openSidebar();
  }
}

function openSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  // Move real panels into sidebar
  const settings = document.getElementById('settingsPanel');
  const info = document.getElementById('infoPanel');
  settings.style.display = 'block';
  settings.style.width = '100%';
  info.style.display = 'block';
  info.style.width = '100%';
  info.style.marginTop = '16px';
  sidebarContent.appendChild(settings);
  sidebarContent.appendChild(info);
  sidebar.classList.add('open');
  overlay.classList.add('open');
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  // Move panels back to game container
  const settings = document.getElementById('settingsPanel');
  const info = document.getElementById('infoPanel');
  const boardWrapper = document.querySelector('.board-wrapper');
  if (settings && settings.parentNode === sidebarContent) {
    settings.style.display = '';
    settings.style.width = '';
    gameContainer.insertBefore(settings, boardWrapper);
  }
  if (info && info.parentNode === sidebarContent) {
    info.style.display = '';
    info.style.width = '';
    info.style.marginTop = '';
    gameContainer.appendChild(info);
  }
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
}

// ==================== PWA ====================
const VERSION_INFO_URL = 'version.json?v=v2026.03.15-9c49be6';
const VERSION_FALLBACK = 'v2026.03.15-9c49be6';

async function applyAppVersion() {
  try {
    const response = await fetch(VERSION_INFO_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error('version fetch failed');
    const data = await response.json();
    const version = data?.version || VERSION_FALLBACK;
    document.getElementById('versionFooter').textContent = `版本：${version}`;
    return version;
  } catch (_) {
    document.getElementById('versionFooter').textContent = `版本：${VERSION_FALLBACK}`;
    return VERSION_FALLBACK;
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js?v=v2026.03.15-9c49be6').catch(() => {});
}

// ==================== INIT ====================
applyAppVersion();

if (!loadGame()) {
  startNewGame();
}
