<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>spike: 合成測試照片渲染頁</title>
<style>
  /* Spike A 專用：不進正式 build（vite.config.js 未列入 rollupOptions.input），
     僅供 scripts/make-test-photos.mjs 以 Playwright 開 headless page 呼叫 window.__renderPhoto。 */
  html, body { margin: 0; padding: 0; background: #202020; }
  #stage {
    position: relative;
    overflow: hidden;
  }
  #deskBg {
    position: absolute;
    inset: 0;
  }
  #perspWrap {
    position: absolute;
  }
  #boardTilt {
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
  }
  #board {
    display: block;
    width: 100%;
    height: 100%;
  }
  #lightOverlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  #noiseOverlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: block;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="deskBg"></div>
  <div id="perspWrap">
    <div id="boardTilt">
      <canvas id="board"></canvas>
    </div>
  </div>
  <div id="lightOverlay"></div>
  <canvas id="noiseOverlay"></canvas>
</div>
<script type="module">
  import { paintBoardBase, paintWoodGrain, paintVignette } from '../board-texture.js';
  import { drawStonePixel } from '../stone.js';

  /** 確定性亂數（mulberry32），與 board-texture.js 內部同款實作（該檔未 export，此處自帶一份）。 */
  function mulberry32(seed) {
    let s = seed >>> 0;
    return function () {
      s |= 0; s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const boardCanvas = document.getElementById('board');

  /** 畫一張終局盤面到 board canvas（內部解析度為顯示尺寸的 2 倍，維持清晰度）。 */
  function drawBoard(grid, size, boardSeed, displayPx) {
    const dpr = 2;
    const margin = displayPx * 0.045;
    const cell = (displayPx - margin * 2) / (size - 1);
    const w = displayPx;
    boardCanvas.width = Math.round(w * dpr);
    boardCanvas.height = Math.round(w * dpr);
    boardCanvas.style.width = `${w}px`;
    boardCanvas.style.height = `${w}px`;
    const ctx = boardCanvas.getContext('2d');
    ctx.save();
    ctx.scale(dpr, dpr);

    paintBoardBase(ctx, w, w);
    paintWoodGrain(ctx, w, w, { seed: boardSeed });

    ctx.strokeStyle = 'rgba(40,26,10,0.65)';
    ctx.lineWidth = Math.max(1, w / 620);
    for (let i = 0; i < size; i++) {
      const p = margin + i * cell;
      ctx.beginPath(); ctx.moveTo(margin, p); ctx.lineTo(w - margin, p); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p, margin); ctx.lineTo(p, w - margin); ctx.stroke();
    }
    if (size === 19) {
      const stars = [3, 9, 15];
      ctx.fillStyle = 'rgba(40,26,10,0.75)';
      for (const r of stars) {
        for (const c of stars) {
          const x = margin + c * cell, y = margin + r * cell;
          ctx.beginPath(); ctx.arc(x, y, Math.max(1.5, w / 260), 0, Math.PI * 2); ctx.fill();
        }
      }
    }

    paintVignette(ctx, w, w);

    const r = cell * 0.46;
    for (let row = 0; row < size; row++) {
      for (let col = 0; col < size; col++) {
        const v = grid[row][col];
        if (!v) continue;
        const x = margin + col * cell, y = margin + row * cell;
        drawStonePixel(ctx, x, y, r, v === 1);
      }
    }
    ctx.restore();
    return w;
  }

  /**
   * 渲染一張「模擬手機拍照」的合成照片：終局盤面 + 3D 透視 + 桌面背景 + 光照不均 + 雜訊 (+ 失焦模糊)。
   * @param {object} p
   * @param {number[][]} p.grid          19x19 終局盤面（0/1/2）
   * @param {number} p.size              盤面路數（spike 固定 19）
   * @param {number} p.boardSeed         木紋 seed（餵給 paintWoodGrain）
   * @param {number} p.stageW p.stageH   輸出畫布尺寸（模擬照片解析度）
   * @param {number} p.boardDisplayPx    盤面顯示邊長（px，決定「棋盤佔畫面比例」）
   * @param {number} p.offsetX p.offsetY 盤面左上角在畫面中的位置（非置中，模擬手持拍歪）
   * @param {number} p.rotX p.rotY       3D 透視角度（deg）
   * @param {number} p.perspective       perspective() 值（px）
   * @param {string} p.deskColor         桌面底色
   * @param {number} p.lightAngleDeg     光照漸層方向
   * @param {number} p.lightAlpha        光照不均強度 0.06–0.18
   * @param {boolean} p.lightDark        true=暗角漸層／false=亮面漸層
   * @param {number} p.noiseSeed         雜訊 seed
   * @param {number} p.noiseAlpha        雜訊顆粒強度
   * @param {number} p.blurPx            失焦模糊（0 = 無）
   */
  window.__renderPhoto = function (p) {
    const stage = document.getElementById('stage');
    stage.style.width = `${p.stageW}px`;
    stage.style.height = `${p.stageH}px`;
    stage.style.filter = p.blurPx ? `blur(${p.blurPx}px)` : 'none';

    const desk = document.getElementById('deskBg');
    desk.style.background =
      `radial-gradient(circle at 48% 38%, ${p.deskColor}, ${p.deskColor})`;

    drawBoard(p.grid, p.size, p.boardSeed, p.boardDisplayPx);

    const wrap = document.getElementById('perspWrap');
    wrap.style.left = `${p.offsetX}px`;
    wrap.style.top = `${p.offsetY}px`;
    wrap.style.width = `${p.boardDisplayPx}px`;
    wrap.style.height = `${p.boardDisplayPx}px`;
    wrap.style.perspective = `${p.perspective}px`;

    const tilt = document.getElementById('boardTilt');
    tilt.style.transform = `rotateX(${p.rotX}deg) rotateY(${p.rotY}deg)`;

    const lightOverlay = document.getElementById('lightOverlay');
    const shade = p.lightDark ? `rgba(20,16,10,${p.lightAlpha})` : `rgba(255,250,235,${p.lightAlpha})`;
    lightOverlay.style.background =
      `linear-gradient(${p.lightAngleDeg}deg, ${shade}, rgba(0,0,0,0) 55%, rgba(0,0,0,0) 100%)`;

    const noiseCanvas = document.getElementById('noiseOverlay');
    noiseCanvas.width = p.stageW;
    noiseCanvas.height = p.stageH;
    const nctx = noiseCanvas.getContext('2d');
    nctx.clearRect(0, 0, p.stageW, p.stageH);
    const rnd = mulberry32(p.noiseSeed);
    const count = Math.round(p.stageW * p.stageH * 0.018);
    for (let i = 0; i < count; i++) {
      const x = rnd() * p.stageW, y = rnd() * p.stageH;
      const v = rnd() > 0.5 ? 255 : 0;
      nctx.fillStyle = `rgba(${v},${v},${v},${(p.noiseAlpha * (0.4 + rnd() * 0.6)).toFixed(3)})`;
      nctx.fillRect(x, y, 1, 1);
    }
    return true;
  };

  window.__ready = true;
</script>
</body>
</html>
